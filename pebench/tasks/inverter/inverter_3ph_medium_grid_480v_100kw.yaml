schema_version: pebench_inverter_v0.1
task_id: inverter_3ph_medium_grid_480v_100kw
topology: three_phase_inverter
difficulty_tier: medium
natural_language_spec: Design a grid-tied 480 V inverter with tighter current quality
  from a 760-900 V DC link to 480 V line-line RMS / 100 kW output at 60 Hz. Meet at
  least 97.2% efficiency, keep current THD below 2.8%, and close voltage, current,
  DC-link ripple, protection, and claim-consistency margins.
