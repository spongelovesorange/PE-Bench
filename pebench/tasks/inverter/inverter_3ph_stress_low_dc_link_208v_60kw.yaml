natural_language_spec: Design a low-DC-link 208 V inverter near modulation boundary
  from a 300-380 V DC link to 208 V line-line RMS / 60 kW output at 60 Hz. Meet at
  least 95.0% efficiency, keep current THD below 4.5%, and close voltage, current,
  DC-link ripple, protection, and claim-consistency margins.
