schema_version: pebench_inverter_v0.1
task_id: inverter_3ph_easy_grid_400v_20kw
topology: three_phase_inverter
difficulty_tier: easy
natural_language_spec: Design a grid-tied 400 V three-phase inverter from a 620-700
  V DC link to 400 V line-line RMS / 20 kW output at 50 Hz. Meet at least 96.5% efficiency,
  keep current THD below 3.5%, and close voltage, current, DC-link ripple, protection,
  and claim-consistency margins.
