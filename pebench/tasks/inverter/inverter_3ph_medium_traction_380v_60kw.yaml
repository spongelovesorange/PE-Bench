schema_version: pebench_inverter_v0.1
task_id: inverter_3ph_medium_traction_380v_60kw
topology: three_phase_inverter
difficulty_tier: medium
natural_language_spec: Design a traction 380 V inverter with regenerative operation
  from a 560-720 V DC link to 380 V line-line RMS / 60 kW output at 60 Hz. Meet at
  least 96.2% efficiency, keep current THD below 3.8%, and close voltage, current,
  DC-link ripple, protection, and claim-consistency margins.
