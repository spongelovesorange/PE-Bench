schema_version: pebench_inverter_v0.1
task_id: inverter_3ph_hard_traction_650v_120kw
topology: three_phase_inverter
difficulty_tier: hard
natural_language_spec: Design a high-power traction inverter at 650 V AC-equivalent
  bus from a 850-1000 V DC link to 650 V line-line RMS / 120 kW output at 60 Hz. Meet
  at least 96.9% efficiency, keep current THD below 3.0%, and close voltage, current,
  DC-link ripple, protection, and claim-consistency margins.
benchmark_meta:
  track: three_phase_inverter_design
  split: extension
  task_family: three_phase_inverter
  source: pebench_final_78task_release_v1
structured_spec:
  dc_link_voltage_v:
    min: 850
    max: 1000
    domain: dc
  output:
    line_line_rms_v: 650.0
    power_w: 120000.0
    frequency_hz: 60.0
    phase_count: 3
    mode: traction
  switching_frequency_khz:
    min: 10
    max: 20
  targets:
    efficiency_percent: 96.9
    thd_percent: 3.0
  constraints:
    max_modulation_index: 0.98
    max_phase_current_rms_a: 148.5
    max_dc_link_ripple_a: 69.6
    max_device_voltage_v: 1200
    requires_isolated_gate_drive: true
    requires_desat_or_ocp: true
  preferences:
