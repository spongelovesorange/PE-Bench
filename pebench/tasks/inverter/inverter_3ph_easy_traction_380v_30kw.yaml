schema_version: pebench_inverter_v0.1
task_id: inverter_3ph_easy_traction_380v_30kw
topology: three_phase_inverter
difficulty_tier: easy
natural_language_spec: Design a traction auxiliary 380 V inverter from a 520-650 V
  DC link to 380 V line-line RMS / 30 kW output at 60 Hz. Meet at least 96.0% efficiency,
  keep current THD below 4.0%, and close voltage, current, DC-link ripple, protection,
  and claim-consistency margins.
