schema_version: pebench_inverter_v0.1
task_id: inverter_3ph_stress_high_current_400v_200kw
topology: three_phase_inverter
difficulty_tier: stress
natural_language_spec: Design a high-current 400 V inverter with conflicting cost
  and derating pressure from a 600-720 V DC link to 400 V line-line RMS / 200 kW output
  at 50 Hz. Meet at least 96.0% efficiency, keep current THD below 4.0%, and close
  voltage, current, DC-link ripple, protection, and claim-consistency margins.
benchmark_meta:
  track: three_phase_inverter_design
  split: extension
  task_family: three_phase_inverter
  source: pebench_final_78task_release_v1
structured_spec:
  dc_link_voltage_v:
    min: 600
    max: 720
    domain: dc
  output:
    line_line_rms_v: 400.0
    power_w: 200000.0
    frequency_hz: 50.0
    phase_count: 3
    mode: standalone
  switching_frequency_khz:
    min: 10
    max: 16
  targets:
    efficiency_percent: 96.0
    thd_percent: 4.0
  constraints:
