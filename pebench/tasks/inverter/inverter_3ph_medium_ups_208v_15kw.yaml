schema_version: pebench_inverter_v0.1
task_id: inverter_3ph_medium_ups_208v_15kw
topology: three_phase_inverter
difficulty_tier: medium
natural_language_spec: Design a UPS 208 V three-phase inverter from a 340-430 V DC
  link to 208 V line-line RMS / 15 kW output at 60 Hz. Meet at least 95.0% efficiency,
  keep current THD below 4.0%, and close voltage, current, DC-link ripple, protection,
  and claim-consistency margins.
