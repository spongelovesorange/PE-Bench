schema_version: pebench_inverter_v0.1
task_id: inverter_3ph_easy_grid_480v_50kw
topology: three_phase_inverter
difficulty_tier: easy
natural_language_spec: Design a grid-tied 480 V three-phase inverter from a 760-850
  V DC link to 480 V line-line RMS / 50 kW output at 60 Hz. Meet at least 97.0% efficiency,
  keep current THD below 3.0%, and close voltage, current, DC-link ripple, protection,
  and claim-consistency margins.
