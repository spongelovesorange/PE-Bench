schema_version: pebench_inverter_v0.1
task_id: inverter_3ph_hard_islanding_480v_40kw
topology: three_phase_inverter
difficulty_tier: hard
natural_language_spec: Design a islanding-capable 480 V microgrid inverter from a
  700-850 V DC link to 480 V line-line RMS / 40 kW output at 60 Hz. Meet at least
  96.8% efficiency, keep current THD below 2.5%, and close voltage, current, DC-link
  ripple, protection, and claim-consistency margins.
