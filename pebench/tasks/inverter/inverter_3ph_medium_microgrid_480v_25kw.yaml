schema_version: pebench_inverter_v0.1
task_id: inverter_3ph_medium_microgrid_480v_25kw
topology: three_phase_inverter
difficulty_tier: medium
natural_language_spec: Design a microgrid-forming 480 V inverter from a 650-760 V
  DC link to 480 V line-line RMS / 25 kW output at 60 Hz. Meet at least 96.4% efficiency,
  keep current THD below 3.2%, and close voltage, current, DC-link ripple, protection,
  and claim-consistency margins.
