schema_version: pebench_inverter_v0.1
task_id: inverter_3ph_hard_grid_800v_100kw
topology: three_phase_inverter
difficulty_tier: hard
natural_language_spec: Design a grid-connected 800 V line-line RMS three-phase inverter
  from a 1200-1500 V DC link to 100 kW output at 50 Hz. Meet at least 97.4% efficiency,
  keep current THD below 2.5%, and close modulation, phase-current, DC-link ripple,
  device-stress, protection, and claim-consistency margins.
benchmark_meta:
  track: three_phase_inverter_design
  split: extension
  task_family: three_phase_inverter
  source: pebench_final_78task_release_v1
structured_spec:
  dc_link_voltage_v:
    min: 1200
    max: 1500
    domain: dc
  output:
    line_line_rms_v: 800.0
    power_w: 100000.0
    frequency_hz: 50.0
    phase_count: 3
    mode: grid_tied
  switching_frequency_khz:
    min: 10
    max: 20
  targets:
    efficiency_percent: 97.4
    thd_percent: 2.5
  constraints:
    max_modulation_index: 0.98
    max_phase_current_rms_a: 92.0
    max_dc_link_ripple_a: 52.0
    max_device_voltage_v: 2000
    requires_isolated_gate_drive: true
    requires_desat_or_ocp: true
  preferences:
    cost_priority: medium
    thermal_priority: high
    control_mode: space_vector_pwm_with_current_loop
  component_catalog_version: pebench-inverter-v0.1
