task_id: boundary_dcdc_12v3a_narrow_duty
natural_language_spec: Design an isolated flyback converter from 36-60 VDC input to
  12 V / 3 A output. Target at least 88.8% efficiency, keep output ripple below 32
  mV, and The design is feasible only if duty cycle, current stress, and filter sizing
  are handled carefully.
