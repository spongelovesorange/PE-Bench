task_id: hard_acdc_19v1p5a_compact
natural_language_spec: Design an isolated flyback converter from 90-265 VAC input
  to 19 V / 1.5 A output. Target at least 88.9% efficiency, keep output ripple below
  42 mV, and The user wants a compact adapter-like design, so avoid loose magnetics
  sizing.
