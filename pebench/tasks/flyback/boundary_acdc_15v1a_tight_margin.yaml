task_id: boundary_acdc_15v1a_tight_margin
natural_language_spec: Design an isolated flyback converter from 85-265 VAC input
  to 15 V / 1 A output. Target at least 88.4% efficiency, keep output ripple below
  42 mV, and This task is intentionally near the boundary where margins are still
  feasible but narrow.
