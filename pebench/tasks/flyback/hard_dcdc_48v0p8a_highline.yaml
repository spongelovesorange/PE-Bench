task_id: hard_dcdc_48v0p8a_highline
natural_language_spec: Design an isolated flyback converter from 72-120 VDC input
  to 48 V / 0.8 A output. Target at least 88.7% efficiency, keep output ripple below
  55 mV, and The high bus voltage makes reflected voltage planning and primary stress
  harder.
difficulty_tier: hard
