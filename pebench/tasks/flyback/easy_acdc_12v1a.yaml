task_id: easy_acdc_12v1a
natural_language_spec: Design an isolated flyback converter from 90-265 VAC input
  to 12 V / 1 A output. Target at least 83.5% efficiency, keep output ripple below
  55 mV, and Favor low BOM cost while still leaving comfortable startup margin.
