task_id: medium_acdc_5v3a
natural_language_spec: Design an isolated flyback converter from 85-265 VAC input
  to 5 V / 3 A output. Target at least 86.8% efficiency, keep output ripple below
  50 mV, and The low-voltage output current is high enough that output filtering and
  derating matter.
