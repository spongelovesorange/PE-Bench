natural_language_spec: Design an isolated flyback converter from 85-265 VAC input
  to 24 V / 1.2 A output. Target at least 89.0% efficiency, keep output ripple below
  45 mV, and Push efficiency while preserving comfortable switch, diode, and magnetics
  stress margin.
