natural_language_spec: Design a non-isolated buck converter from 18-30 VDC input to
  3.3 V / 4.0 A output. Target at least 87.5% efficiency, keep output ripple below
  30 mV, and maintain conservative switch, diode, inductor, and claim-consistency
  margins for a low-voltage digital rail.
